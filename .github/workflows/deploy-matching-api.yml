name: Deploy Matching API to Cloud Run

on:
  # トリガー条件: main, master, または yama ブランチへの Push
  push:
    branches: [main, master, yama]
  # GitHub Actions 画面からの手動実行も許可
  workflow_dispatch:

env:
  PROJECT_ID: flutter-frontend-21d0a
  SERVICE_NAME: matching-functions
  REGION: asia-northeast1
  REPOSITORY: matching-app # Artifact Registry repository name

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Google Cloud への認証 (Workload Identity Federation)
      - name: Google Auth
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      # 3. Cloud SDK (gcloud コマンド) のセットアップ
      - name: Set up Cloud SDK
        uses: "google-github-actions/setup-gcloud@v2"

      # 4. Docker クライアントの認証 (Artifact Registry へ Push するため)
      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 5. Docker イメージのビルド
      # infrastructure/firebase/functions/Dockerfile を使用してビルド
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} -f infrastructure/firebase/functions/Dockerfile .

      # 6. Docker イメージを Artifact Registry へ Push
      - name: Push Docker Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # 7. Cloud Run へデプロイ
      # --allow-unauthenticated: 公開 API としてデプロイ (認証不要)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated
