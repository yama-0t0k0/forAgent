name: admin_app_backend
description: Backend logic for Admin App (Pure Dart)
version: 1.0.0

environment:
  sdk: ">=3.6.0 <4.0.0"

resolution: workspace

dependencies:
  # HTTP client for external API calls
  http: ^1.1.0

  # JSON serialization
  json_annotation: ^4.8.1

  # Logging
  logging: ^1.2.0

  # Environment variables
  dotenv: ^4.2.0

  # Firebase Admin SDK (for Cloud Functions)
  # Uncomment when needed:
  # firebase_admin: ^0.3.0

  # 共通Dartモデル (将来的に作成予定)
  # shared_dart_models:
  #   path: ../../../shared/dart_models

dev_dependencies:
  # Linting rules for Pure Dart
  lints: ^3.0.0

  # Testing framework
  test: ^1.24.0

  # Code generation for JSON serialization
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
