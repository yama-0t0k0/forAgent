appId: host.exp.Exponent
---
- launchApp:
    appId: "host.exp.Exponent"
    stopApp: false

- openLink: ${EXPO_URL}
- evalScript: |
    // Wait for Expo to settle
    maestro.sleep(10000)

# 1. Wait for app to load
- extendedWaitUntil:
    notVisible:
      id: "app_loading_view"
    timeout: 60000

- extendedWaitUntil:
    visible:
      id: "nav_tab_Home"
    timeout: 60000

# 2. Navigate to Menu via Footer
- tapOn:
    id: "nav_tab_Menu"

# 3. Enter Profile Edit
- extendedWaitUntil:
    visible: "メニュー"
    timeout: 10000

- tapOn:
    point: "50%, 25%" # First menu item area

- evalScript: |
    // Wait for the Profile Editor to load content
    maestro.sleep(10000)

# 4. Verify Content & Tabs
- assertVisible: "エンジニア個人登録"
- assertVisible: "Save"

# 5. Switch Tabs (Verification of Metadata Rendering)
- tapOn:
    point: "25%, 10%" # 基本情報 (approx)
- assertVisible:
    text: "氏名" # 基本情報タブの代表項目
    timeout: 5000

- tapOn:
    point: "50%, 10%" # スキル経験 (approx)
- assertVisible:
    text: "経験年数" # スキル経験タブの代表項目
    timeout: 5000

- tapOn:
    point: "75%, 10%" # 志向 (approx)
- assertVisible:
    text: "希望勤務地" # 志向タブの代表項目
    timeout: 5000

- tapOn:
    point: "90%, 10%" # 職歴 (approx)
- assertVisible:
    text: "会社名" # 職歴タブの代表項目
    timeout: 5000

# 6. Final Evidence Capture (while on Work History tab)
- takeScreenshot: profile_edit_evidence_success

- stopApp
