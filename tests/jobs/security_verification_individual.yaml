appId: host.exp.Exponent
---
# Security Verification: Individual Access
# Verifies that Individual User can access their own Public and Private information.
# Related to Issue #291 (Security Verification)

- openLink: ${EXPO_URL}
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "開く"
    optional: true
- tapOn:
    point: "75%, 54%"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    point: "50%, 90%"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true

# 1. Verify App Loaded & Private Info Access
# Individual App displays profile on home screen.
# Visibility of Name/Email (Private Info) confirms read access to 'private_info' (own data).
- extendedWaitUntil:
    visible:
        id: "user_full_name"
    timeout: 60000
- assertVisible:
    id: "user_full_name"

- extendedWaitUntil:
    visible:
        id: "user_email"
    timeout: 10000
- assertVisible:
    id: "user_email"

# 2. Verify Public Profile Access (Heatmap)
- scrollUntilVisible:
    element:
        id: "skill_heatmap"
    direction: DOWN
- assertVisible:
    id: "skill_heatmap"
