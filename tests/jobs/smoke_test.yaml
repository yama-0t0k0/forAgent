appId: host.exp.Exponent # Expo Go Bundle ID
---
# Smoke Test for Admin App
# Assumes app is already launched via Expo Go URL

- openLink: ${APP_URL}


- runFlow:
    when:
      visible: "管理ダッシュボード"
    commands:
      - tapOn: "個人"
      - assertVisible: "今月登録" # Tab specific filter label
      - tapOn: "法人"
      - assertVisible: "契約中" # Tab specific filter label
      - tapOn: "求人"
      - assertVisible: "募集中" # Tab specific filter label
      - tapOn: "選考"
      - assertVisible: "選考中" # Tab specific filter label
      - tapOn: "ホーム"
      - assertVisible: "管理ダッシュボード"

# Individual Detail Drill-down
- tapOn: "個人"
- tapOn:
    index: 0 # Tap first user in list
- assertVisible: "個人詳細"
- scrollUntilVisible:
    element: "つながり"
    direction: DOWN
- tapOn: "つながり"
- assertVisible: "つながり候補" # Connection Screen Header
