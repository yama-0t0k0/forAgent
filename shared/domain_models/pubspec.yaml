# 役割（機能概要）:
# - アプリケーション全体で共通使用するドメインモデル定義
# - エンジニア、企業、求人情報などのデータ構造を提供
# - JSONシリアライズ/デシリアライズ機能
# - バリデーションロジック（必要に応じて）
#
# ディレクトリ構造:
# ├── lib/
# │   ├── src/ (モデル実装)
# │   └── domain_models.dart (エクスポート定義)
# ├── test/ (単体テスト)
# └── pubspec.yaml (依存関係定義)
#
# デプロイ・実行方法:
# - テスト実行: melos run test
# - コード生成: dart run build_runner build

name: domain_models
description: Shared domain models for Career Dev Tool
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

resolution: workspace

dependencies:
  json_annotation: ^4.8.1
  equatable: ^2.0.5

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
